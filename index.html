<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro de Acciones</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 20px;
    }
    h1 {
        text-align: center;
    }
    table {
        width: 100%;
        border-collapse: collapse;
    }
    th, td {
        border: 1px solid #ccc;
        padding: 10px;
        text-align: left;
    }
    textarea {
        width: 100%;
        height: 60px;
        resize: none;
    }
    .buttons {
        margin-top: 20px;
        text-align: center;
    }
    button {
        margin: 5px;
        padding: 10px 15px;
        cursor: pointer;
    }
</style>

</head>
<body>

<h1>Registro de Acciones</h1>

<p><strong>Código:</strong> <span id="codigo"></span></p>
<p><strong>Fecha:</strong> <span id="fecha"></span></p>

<table id="tabla">
    <tr>
        <th>Acción</th>
        <th>Descripción (máx. 200 caracteres)</th>
    </tr>
    <tr>
        <td>Acción 1</td>
        <td><textarea maxlength="200" oninput="actualizarFecha()"></textarea></td>
    </tr>
    <tr>
        <td>Acción 2</td>
        <td><textarea maxlength="200" oninput="actualizarFecha()"></textarea></td>
    </tr>
    <tr>
        <td>Acción 3</td>
        <td><textarea maxlength="200" oninput="actualizarFecha()"></textarea></td>
    </tr>
</table>

<div class="buttons">
    <button onclick="exportarPDF()">Exportar a PDF</button>
    <button onclick="exportarExcel()">Exportar a Excel</button>
    <button onclick="exportarJPEG()">Exportar a JPEG</button>
    <button onclick="enviarEmail()">Enviar por Email</button>
</div>

<!-- Librerías -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

// Generar código de 3 cifras
function generarCodigo() {
    return Math.floor(100 + Math.random() * 900);
}

// Fecha actual
function obtenerFecha() {
    const ahora = new Date();
    return ahora.toLocaleString();
}

// Inicialización
document.getElementById("codigo").innerText = generarCodigo();
document.getElementById("fecha").innerText = obtenerFecha();

// Actualizar fecha cuando se modifica
function actualizarFecha() {
    document.getElementById("fecha").innerText = obtenerFecha();
}

// Exportar a PDF
function exportarPDF() {
    html2canvas(document.body).then(canvas => {
        const imgData = canvas.toDataURL("image/png");
        const pdf = new jspdf.jsPDF();
        pdf.addImage(imgData, 'PNG', 10, 10, 180, 0);
        pdf.save("registro.pdf");
    });
}

// Exportar a Excel
function exportarExcel() {
    let tabla = document.getElementById("tabla").outerHTML;
    let url = 'data:application/vnd.ms-excel,' + encodeURIComponent(tabla);
    let link = document.createElement("a");
    link.href = url;
    link.download = "registro.xls";
    link.click();
}

// Exportar a JPEG
function exportarJPEG() {
    html2canvas(document.body).then(canvas => {
        let link = document.createElement('a');
        link.download = 'registro.jpeg';
        link.href = canvas.toDataURL("image/jpeg");
        link.click();
    });
}

// Enviar por email
function enviarEmail() {
    let asunto = "Registro de Acciones";
    let cuerpo = "Código: " + document.getElementById("codigo").innerText +
                 "%0D%0AFecha: " + document.getElementById("fecha").innerText;
    
    window.location.href = `mailto:?subject=${asunto}&body=${cuerpo}`;
}

</script>

</body>
</html>
